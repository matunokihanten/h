
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建築職人 - 本格木組みパズル (最新版)</title>
    <style>
        /* 全体の和風デザイン設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #dcd3c4;
            background-image: radial-gradient(#cbd2c2 1px, transparent 0), radial-gradient(#cbd2c2 1px, transparent 0);
            background-size: 12px 12px;
            background-position: 0 0, 6px 6px;
            font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
            text-align: center;
            user-select: none;
            overflow: hidden;
            min-height: 100vh;
        }

        #wrapper {
            position: relative;
            width: 900px;
            height: 560px;
            margin: 20px auto;
            box-sizing: border-box;
        }

        /* 上部看板 */
        #header-board {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 65px;
            background: linear-gradient(to bottom, #5c442c, #3d2c1c);
            border: 3px solid #8e6d4f;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            color: #fcf8f2;
            z-index: 10;
        }

        #level-title {
            margin: 4px 0 2px 0;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #f1c40f;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #timer-display {
            margin: 0;
            font-size: 14px;
            font-family: monospace;
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* メインステージ */
        #game-container {
            position: absolute;
            top: 85px;
            left: 25px;
            width: 850px;
            height: 440px;
            background-color: #f2e6d0;
            border-top: 12px solid #4a3319;
            border-bottom: 12px solid #4a3319;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            border-radius: 2px;
        }

        .scroll-roller {
            position: absolute;
            top: -15px;
            width: 14px;
            height: 470px;
            background: linear-gradient(to right, #2c1a0c, #4a3319, #2c1a0c);
            border-radius: 4px;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3);
        }
        #roller-left { left: -14px; }
        #roller-right { right: -14px; }

        #stage-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 520px;
            height: 440px;
            background: #ebdcc5;
            border-right: 4px dashed #caa885;
            box-sizing: border-box;
        }

        /* シルエット（影）の三角形 */
        .silhouette-tri {
            position: absolute;
            background-color: #b0a38f;
            opacity: 0.6;
            transition: opacity 0.5s ease;
            box-sizing: border-box;
        }
        /* 画像のようにシルエットにも目地（白線）を入れる */
        .silhouette-up {
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            border-bottom: 1px solid #ebdcc5;
        }
        .silhouette-down {
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            border-top: 1px solid #ebdcc5;
        }

        #glow-ring {
            display: none;
            position: absolute;
            top: 85px;
            left: 125px;
            width: 270px;
            height: 270px;
            border-radius: 50%;
            box-shadow: 0 0 40px #f39c12, inset 0 0 30px #f1c40f;
            animation: pulseGlow 2s infinite ease-in-out;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.96); opacity: 0.6; }
            50% { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(0.96); opacity: 0.6; }
        }

        #castle-icon {
            display: none;
            position: absolute;
            top: 195px;
            left: 235px;
            width: 50px;
            height: 50px;
            z-index: 8;
            pointer-events: none;
            animation: fadeInIcon 0.8s ease-out forwards;
        }

        @keyframes fadeInIcon {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 0.85; transform: scale(1); }
        }

        #stage-right {
            position: absolute;
            top: 0;
            left: 520px;
            width: 330px;
            height: 440px;
            background-color: #f5eedf;
            box-sizing: border-box;
        }

        /* パズルピースのコンテナ */
        .piece {
            position: absolute;
            cursor: move;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
            touch-action: none;
            transition: transform 0.1s ease-out;
        }

        .piece.dragging {
            filter: drop-shadow(6px 12px 10px rgba(0,0,0,0.5));
            z-index: 100;
        }

        /* ピースを構成する小さな三角形 */
        .sub-triangle {
            position: absolute;
            width: 46px; /* S */
            height: 39.84px; /* H */
            /* 1つの三角形の「頂点だけで繋がる」表現を再現するため縮尺を調整 */
            transform: scale(0.98); 
            transform-origin: center center;
        }

        .sub-up { clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        .sub-down { clip-path: polygon(0% 0%, 100% 0%, 50% 100%); }

        .flash-effect { animation: successFlash 0.4s ease-out; }
        @keyframes successFlash {
            0% { filter: brightness(1) drop-shadow(0 0 0px #fff); }
            50% { filter: brightness(2) drop-shadow(0 0 25px #fff); }
            100% { filter: brightness(1) drop-shadow(0 0 0px transparent); }
        }

        /* メニューボタン */
        .side-menu-box {
            position: absolute; left: -15px; width: 50px; background: #fff5e6;
            border: 2px solid #5c442c; border-radius: 6px; box-shadow: -2px 4px 6px rgba(0,0,0,0.2);
            padding: 8px 0; cursor: pointer; text-align: center; z-index: 12; transition: all 0.2s;
        }
        .side-menu-box:hover { background: #f39c12; color: white; border-color: #3d2c1c; }
        .side-menu-box.disabled { background: #d5dbdb !important; color: #7f8c8d !important; border-color: #bdc3c7 !important; cursor: not-allowed; }
        .side-menu-icon { width: 32px; height: 32px; margin: 0 auto; }
        .side-menu-text { font-size: 10px; font-weight: bold; margin-top: 3px; line-height: 1.1; color: #3d2c1c; }
        #btn-hint { top: 160px; }
        #btn-instant { top: 250px; }

        /* クリア文字演出 */
        #clear-overlay-text {
            display: none; position: absolute; top: 20px; left: 260px;
            transform: translateX(-50%); z-index: 20; pointer-events: none;
        }
        .clear-main-txt {
            font-size: 42px; font-weight: bold; color: #e74c3c; margin: 0; letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 20px #fff;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .clear-sub-txt {
            font-size: 22px; font-weight: bold; color: #4a3621; margin: 5px 0 0 0; letter-spacing: 4px;
            text-shadow: 1px 1px 2px #fff;
        }
        @keyframes scaleIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* アクションボタン */
        .action-btn {
            display: none; position: absolute; right: 40px; width: 250px; height: 50px;
            line-height: 46px; font-size: 18px; font-weight: bold; color: white;
            border: 2px solid rgba(0,0,0,0.2); border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-sizing: border-box; animation: fadeInRight 0.6s ease-out forwards;
        }
        .action-btn:hover { filter: brightness(1.1); box-shadow: 0 6px 12px rgba(0,0,0,0.25); }
        #btn-next { top: 200px; background: linear-gradient(to bottom, #27ae60, #1e7e43); }
        #btn-reset { top: 270px; background: linear-gradient(to bottom, #2980b9, #1f618d); }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        /* ゲームオーバー画面 */
        #gameover-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 34, 24, 0.85); z-index: 100; color: #fff;
            box-sizing: border-box; padding-top: 150px;
        }
        #gameover-screen h2 { font-size: 36px; color: #e74c3c; margin-bottom: 20px; letter-spacing: 4px; }
        #gameover-screen button {
            padding: 10px 30px; font-size: 16px; font-weight: bold; background: #e67e22;
            color: white; border: none; border-radius: 4px; cursor: pointer;
        }
        #gameover-screen button:hover { background: #d35400; }

        #instruction-bottom { margin-top: 15px; font-size: 13px; color: #4a3621; line-height: 1.6; font-weight: bold; }
        .maple-leaf { position: absolute; pointer-events: none; opacity: 0.85; }
    </style>
</head>
<body>

    <div id="wrapper">
        <svg class="maple-leaf" width="70" height="70" viewBox="0 0 100 100" style="top:-15px; left:-15px; transform:rotate(-10deg);">
            <path d="M50,95 Q46,65 46,55 Q20,68 8,50 Q35,46 40,40 Q12,22 24,10 Q45,32 46,38 Q50,4 54,4 Q54,38 55,38 Q76,10 88,22 Q65,40 60,46 Q88,50 92,62 Q54,65 50,95 Z" fill="#b22222"/>
        </svg>
        <svg class="maple-leaf" width="55" height="55" viewBox="0 0 100 100" style="top:10px; left:40px; transform:rotate(25deg); opacity:0.6;">
            <path d="M50,95 Q46,65 46,55 Q20,68 8,50 Q35,46 40,40 Q12,22 24,10 Q45,32 46,38 Q50,4 54,4 Q54,38 55,38 Q76,10 88,22 Q65,40 60,46 Q88,50 92,62 Q54,65 50,95 Z" fill="#d35400"/>
        </svg>

        <div id="header-board">
            <div id="level-title">Lv1 建築</div>
            <div id="timer-display">残り時間: 01:00</div>
        </div>

        <div id="btn-hint" class="side-menu-box" onclick="triggerHint()">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" stroke="#5c442c" stroke-width="2">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                <circle cx="12" cy="12" r="4"/>
            </svg>
            <div class="side-menu-text">匠の一手<br><span id="hint-count">3/3</span></div>
        </div>

        <div id="btn-instant" class="side-menu-box" onclick="triggerInstantClear()">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" stroke="#5c442c" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M21 7l-7 7-4-4-7 7"/>
            </svg>
            <div class="side-menu-text">匠心速成</div>
        </div>

        <div id="game-container">
            <div id="roller-left" class="scroll-roller"></div>
            <div id="roller-right" class="scroll-roller"></div>

            <div id="stage-left">
                <div id="glow-ring"></div>
                <div id="castle-icon">
                    <svg viewBox="0 0 100 100" width="100%" height="100%">
                        <path d="M20,85 L80,85 L80,70 L72,70 L72,55 L62,55 L62,35 L68,35 L68,22 L50,6 L32,22 L32,35 L38,35 L38,55 L28,55 L28,70 L20,70 Z" fill="#3d2c1c"/>
                        <rect x="46" y="65" width="8" height="20" fill="#f2e6d0"/>
                        <line x1="20" y1="85" x2="80" y2="85" stroke="#3d2c1c" stroke-width="4"/>
                    </svg>
                </div>
                <div id="clear-overlay-text">
                    <p class="clear-main-txt">正解！</p>
                    <p class="clear-sub-txt">建築完了</p>
                </div>
            </div>

            <div id="stage-right"></div>

            <div id="btn-next" class="action-btn" onclick="goToNextLevel()">次のレベルへ (Lv2)</div>
            <div id="btn-reset" class="action-btn" onclick="resetCurrentLevel()">もう一度やり直す</div>

            <div id="gameover-screen">
                <h2>無念！時間切れ</h2>
                <p>制限時間内に建築が間に合いませんでした。</p>
                <button onclick="resetCurrentLevel()">手直しする (再挑戦)</button>
            </div>
        </div>
    </div>

    <div id="instruction-bottom">
        【操作心得】<br>
        一、複数の三角が頂点や辺で繋がった木材パーツを、左の影へハメ込むべし。<strong>（吸着判定：10px）</strong><br>
        二、木材は必ず「最低3つ以上の三角」が結合しておる。右側の待機陣地からドラッグで運ぶのだ。
    </div>

    <script>
        let currentLevel = 1;
        let timeLeft = 60; 
        let timerInterval = null;
        let activePiece = null;
        let offsetX = 0;
        let offsetY = 0;
        let hintsLeft = 3;
        let isCleared = false;

        const container = document.getElementById('game-container');
        const stageLeft = document.getElementById('stage-left');
        const stageRight = document.getElementById('stage-right');
        const timerDisplay = document.getElementById('timer-display');
        const levelTitle = document.getElementById('level-title');

        // ==== グリッド定義 ====
        const S = 46; 
        const H = 39.84; 
        
        const BASE_X = 156;
        const BASE_Y = 140;

        const baseGrid = [];
        let idCounter = 0;

        // 最大24マスの配置定義（六角形）
        const gridDef = [
            { r: 0, cStart: 2, cEnd: 6 },
            { r: 1, cStart: 1, cEnd: 7 },
            { r: 2, cStart: 1, cEnd: 7 },
            { r: 3, cStart: 2, cEnd: 6 }
        ];

        gridDef.forEach(row => {
            for (let c = row.cStart; c <= row.cEnd; c++) {
                let type = ((row.r + c) % 2 === 0) ? 'up' : 'down';
                let bx = c * (S / 2);
                let by = row.r * H;
                // 画像(image_3ea57d.png)のように頂点同士でも繋がれるよう、neighbors に含めるための拡張
                baseGrid.push({ id: idCounter++, type, bx, by, r: row.r, c: c, neighbors: [], vertexNeighbors: [] });
            }
        });

        // 隣接関係の特定（辺の共有 ＋ 頂点の共有）
        for (let i = 0; i < baseGrid.length; i++) {
            for (let j = 0; j < baseGrid.length; j++) {
                if (i === j) continue;
                let t1 = baseGrid[i], t2 = baseGrid[j];
                
                // 1. 辺の共有 (Edge Neighbors)
                let isEdgeNeighbor = false;
                if (t1.type === 'up') {
                    if (t2.r === t1.r + 1 && t2.c === t1.c) isEdgeNeighbor = true; 
                    if (t2.r === t1.r && t2.c === t1.c - 1) isEdgeNeighbor = true; 
                    if (t2.r === t1.r && t2.c === t1.c + 1) isEdgeNeighbor = true; 
                } else {
                    if (t2.r === t1.r - 1 && t2.c === t1.c) isEdgeNeighbor = true; 
                    if (t2.r === t1.r && t2.c === t1.c - 1) isEdgeNeighbor = true; 
                    if (t2.r === t1.r && t2.c === t1.c + 1) isEdgeNeighbor = true; 
                }
                
                // 2. 頂点のみの共有 (Vertex Neighbors) - 距離で大まかに判定
                let dx = t1.bx - t2.bx;
                let dy = t1.by - t2.by;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (isEdgeNeighbor) {
                    baseGrid[i].neighbors.push(j);
                } else if (dist <= S + 2) { 
                    // 辺は共有していないが距離が近い＝頂点で接している
                    baseGrid[i].vertexNeighbors.push(j);
                }
            }
        }

        const woodGradients = [
            "linear-gradient(135deg, #5c3a21, #3d2616)", // 濃い茶色
            "linear-gradient(135deg, #7c4f30, #5a3922)", // 少し明るい茶色
            "linear-gradient(135deg, #8b5a33, #6b4426)", // さらに明るい茶色
            "linear-gradient(135deg, #6b3e23, #4a2b18)", 
            "linear-gradient(135deg, #543620, #382415)",
        ];

        // ピースを「最低3つ以上の三角」で構成するアルゴリズム（頂点繋がりも許容）
        function generatePieceGroups() {
            let partitionSuccess = false;
            let finalGroups = [];

            while (!partitionSuccess) {
                let unassigned = new Set(Array.from({length: 24}, (_, i) => i));
                finalGroups = [];
                let possible = true;

                while (unassigned.size > 0) {
                    let start = Array.from(unassigned)[Math.floor(Math.random() * unassigned.size)];
                    let piece = [start];
                    unassigned.delete(start);

                    let targetSize = 3 + Math.floor(Math.random() * 2); // 3〜4

                    // 辺繋がり ＋ 頂点繋がり の両方を候補にする
                    let currentNeighbors = new Set(
                        [...baseGrid[start].neighbors, ...baseGrid[start].vertexNeighbors]
                        .filter(n => unassigned.has(n))
                    );

                    while(piece.length < targetSize && currentNeighbors.size > 0) {
                        let next = Array.from(currentNeighbors)[Math.floor(Math.random() * currentNeighbors.size)];
                        piece.push(next);
                        unassigned.delete(next);
                        currentNeighbors.delete(next);
                        
                        let allNewNeighbors = [...baseGrid[next].neighbors, ...baseGrid[next].vertexNeighbors];
                        allNewNeighbors.forEach(n => {
                            if(unassigned.has(n)) currentNeighbors.add(n);
                        });
                    }
                    finalGroups.push(piece);
                }

                let mergedAny = true;
                let attempts = 0;
                while (mergedAny && attempts < 50) {
                    mergedAny = false;
                    for (let i = 0; i < finalGroups.length; i++) {
                        if (finalGroups[i].length < 3) {
                            let smallPiece = finalGroups[i];
                            let bestMergeIdx = -1;
                            let minSize = 999;

                            for (let j = 0; j < finalGroups.length; j++) {
                                if (i === j) continue;
                                let isAdjacent = false;
                                for (let n1 of smallPiece) {
                                    for (let n2 of finalGroups[j]) {
                                        // 辺または頂点で繋がっていれば結合可能
                                        if (baseGrid[n1].neighbors.includes(n2) || baseGrid[n1].vertexNeighbors.includes(n2)) { 
                                            isAdjacent = true; break; 
                                        }
                                    }
                                    if(isAdjacent) break;
                                }
                                if (isAdjacent && finalGroups[j].length < minSize) {
                                    minSize = finalGroups[j].length;
                                    bestMergeIdx = j;
                                }
                            }
                            if (bestMergeIdx !== -1) {
                                finalGroups[bestMergeIdx] = finalGroups[bestMergeIdx].concat(smallPiece);
                                finalGroups.splice(i, 1);
                                mergedAny = true;
                                break;
                            } else {
                                possible = false;
                            }
                        }
                    }
                    attempts++;
                }
                
                if (possible && finalGroups.every(p => p.length >= 3)) {
                    partitionSuccess = true;
                }
            }
            return finalGroups;
        }

        function initLevel(lv) {
            currentLevel = lv;
            isCleared = false;
            
            document.querySelectorAll('.piece').forEach(p => p.remove());
            document.querySelectorAll('.silhouette-tri').forEach(p => p.remove());
            document.getElementById('clear-overlay-text').style.display = 'none';
            document.getElementById('glow-ring').style.display = 'none';
            document.getElementById('castle-icon').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';

            levelTitle.innerText = `Lv${lv} 建築`;
            timeLeft = 60 + (lv - 1) * 15;
            updateTimerUI();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(countDown, 1000);

            // シルエット描画（画像のような白線付き）
            baseGrid.forEach(t => {
                const sEl = document.createElement('div');
                sEl.className = `silhouette-tri silhouette-${t.type}`;
                sEl.style.left = (BASE_X + t.bx) + 'px';
                sEl.style.top = (BASE_Y + t.by) + 'px';
                // 幅と高さを厳密に指定
                sEl.style.width = S + 'px';
                sEl.style.height = H + 'px';
                stageLeft.appendChild(sEl);
            });

            const pieceGroups = generatePieceGroups();

            const COLS = 2; 
            const CELL_W = 330 / COLS;
            const ROWS = Math.ceil(pieceGroups.length / COLS);
            const CELL_H = 440 / ROWS;

            pieceGroups.forEach((group, index) => {
                const pContainer = document.createElement('div');
                pContainer.className = 'piece';
                
                let minBx = Math.min(...group.map(id => baseGrid[id].bx));
                let minBy = Math.min(...group.map(id => baseGrid[id].by));
                let maxBx = Math.max(...group.map(id => baseGrid[id].bx + S));
                let maxBy = Math.max(...group.map(id => baseGrid[id].by + H));
                
                let pWidth = maxBx - minBx;
                let pHeight = maxBy - minBy;
                pContainer.style.width = pWidth + 'px';
                pContainer.style.height = pHeight + 'px';

                pContainer.dataset.targetX = BASE_X + minBx;
                pContainer.dataset.targetY = BASE_Y + minBy;
                pContainer.dataset.placed = 'false';

                const woodBg = woodGradients[index % woodGradients.length];

                group.forEach(id => {
                    let tData = baseGrid[id];
                    let tEl = document.createElement('div');
                    tEl.className = `sub-triangle sub-${tData.type}`;
                    tEl.style.background = woodBg;
                    tEl.style.left = (tData.bx - minBx) + 'px';
                    tEl.style.top = (tData.by - minBy) + 'px';
                    pContainer.appendChild(tEl);
                });

                const col = index % COLS;
                const row = Math.floor(index / COLS);
                const initX = 520 + (col * CELL_W) + (CELL_W / 2) - (pWidth / 2);
                const initY = (row * CELL_H) + (CELL_H / 2) - (pHeight / 2);

                pContainer.style.left = initX + 'px';
                pContainer.style.top = initY + 'px';

                pContainer.addEventListener('mousedown', startDrag);
                pContainer.addEventListener('touchstart', startDrag, { passive: false });

                container.appendChild(pContainer);
            });

            hintsLeft = 3;
            document.getElementById('hint-count').innerText = "3/3";
            document.getElementById('btn-hint').classList.remove('disabled');
        }

        function countDown() {
            if (isCleared) return;
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('gameover-screen').style.display = 'block';
            }
        }

        function updateTimerUI() {
            const min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            const sec = String(timeLeft % 60).padStart(2, '0');
            timerDisplay.innerText = `残り時間: ${min}:${sec}`;
        }

        function startDrag(e) {
            if (isCleared || e.currentTarget.dataset.placed === 'true') return;
            activePiece = e.currentTarget;
            activePiece.classList.add('dragging');
            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            const containerRect = container.getBoundingClientRect();
            offsetX = (clientX - containerRect.left) - activePiece.offsetLeft;
            offsetY = (clientY - containerRect.top) - activePiece.offsetTop;
        }

        function drag(e) {
            if (!activePiece) return;
            if (e.cancelable) e.preventDefault();
            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            const containerRect = container.getBoundingClientRect();
            let x = clientX - containerRect.left - offsetX;
            let y = clientY - containerRect.top - offsetY;

            if (x < 0) x = 0; if (y < 0) y = 0;
            if (x > containerRect.width - 50) x = containerRect.width - 50; 
            if (y > containerRect.height - 50) y = containerRect.height - 50;

            activePiece.style.left = x + 'px';
            activePiece.style.top = y + 'px';
        }

        function endDrag(e) {
            if (!activePiece) return;
            const targetX = parseFloat(activePiece.dataset.targetX);
            const targetY = parseFloat(activePiece.dataset.targetY);
            const distance = Math.sqrt(Math.pow(targetX - activePiece.offsetLeft, 2) + Math.pow(targetY - activePiece.offsetTop, 2));

            // 吸着判定：10px以内
            if (distance <= 10) {
                activePiece.style.left = targetX + 'px';
                activePiece.style.top = targetY + 'px';
                activePiece.dataset.placed = 'true';
                activePiece.classList.remove('dragging');
                activePiece.style.cursor = 'default';
                
                activePiece.classList.add('flash-effect');
                const targetP = activePiece;
                setTimeout(() => targetP.classList.remove('flash-effect'), 400);

                checkStageClear();
            }

            if(activePiece) {
                activePiece.classList.remove('dragging');
                activePiece = null;
            }
        }

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function checkStageClear() {
            const allPieces = document.querySelectorAll('.piece');
            if (Array.from(allPieces).every(p => p.dataset.placed === 'true') && !isCleared) {
                isCleared = true;
                clearInterval(timerInterval);
                levelTitle.innerText = `Lv${currentLevel}（済）`;
                document.querySelectorAll('.silhouette-tri').forEach(s => s.style.opacity = '0');
                document.getElementById('glow-ring').style.display = 'block';
                document.getElementById('castle-icon').style.display = 'block';
                document.getElementById('clear-overlay-text').style.display = 'block';

                setTimeout(() => {
                    const btnNext = document.getElementById('btn-next');
                    btnNext.innerText = `次のレベルへ (Lv${currentLevel + 1})`;
                    btnNext.style.display = 'block';
                    document.getElementById('btn-reset').style.display = 'block';
                }, 600);
            }
        }

        function triggerHint() {
            if (isCleared || hintsLeft <= 0) return;
            const unplaced = Array.from(document.querySelectorAll('.piece')).find(p => p.dataset.placed === 'false');
            if (unplaced) {
                hintsLeft--;
                document.getElementById('hint-count').innerText = `${hintsLeft}/3`;
                if(hintsLeft === 0) document.getElementById('btn-hint').classList.add('disabled');
                unplaced.style.left = unplaced.dataset.targetX + 'px';
                unplaced.style.top = unplaced.dataset.targetY + 'px';
                unplaced.dataset.placed = 'true';
                unplaced.style.cursor = 'default';
                unplaced.classList.add('flash-effect');
                setTimeout(() => unplaced.classList.remove('flash-effect'), 400);
                checkStageClear();
            }
        }

        function triggerInstantClear() {
            if (isCleared) return;
            document.querySelectorAll('.piece').forEach(p => {
                if(p.dataset.placed === 'false') {
                    p.style.left = p.dataset.targetX + 'px';
                    p.style.top = p.dataset.targetY + 'px';
                    p.dataset.placed = 'true';
                    p.style.cursor = 'default';
                }
            });
            checkStageClear();
        }

        function goToNextLevel() { initLevel(currentLevel + 1); }
        function resetCurrentLevel() { initLevel(currentLevel); }

        window.onload = () => { initLevel(1); };
    </script>
</body>
</html>
